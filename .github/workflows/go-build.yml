name: Go Build & Test

on:
  pull_request:
    paths:
      - 'tools/**'
  push:
    branches:
      - main
    paths:
      - 'tools/**'

jobs:
  build-test:
    name: Build, Vet & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/healthcheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tools/healthcheck/go.sum

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Run tests (with race detector)
        run: go test ./... -v -race -count=1

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o healthcheck .

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: '2024.1'
          working-directory: tools/healthcheck

  security:
    name: gosec Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./tools/healthcheck/...

  docker-build:
    name: Docker Build (scratch image)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build scratch image
        run: |
          docker build \
            -f tools/healthcheck/Dockerfile \
            -t eks-healthcheck:${{ github.sha }} \
            .
          echo "Image size:"
          docker image inspect eks-healthcheck:${{ github.sha }} \
            --format='{{.Size}}' | \
            awk '{printf "%.2f MB\n", $1/1048576}'
